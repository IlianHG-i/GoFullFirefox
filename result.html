<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GoFullFox</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Background — iOS 26 mesh gradient ── */
      body {
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                     "Helvetica Neue", sans-serif;
        background-color: #dce8f8;
        background-image:
          radial-gradient(ellipse 80% 60% at 10%  20%, rgba(186,215,255,0.85) 0%, transparent 60%),
          radial-gradient(ellipse 60% 50% at 85%  10%, rgba(209,188,255,0.70) 0%, transparent 55%),
          radial-gradient(ellipse 55% 55% at 75%  80%, rgba(255,188,226,0.55) 0%, transparent 55%),
          radial-gradient(ellipse 65% 45% at 20%  85%, rgba(178,236,255,0.60) 0%, transparent 55%),
          radial-gradient(ellipse 40% 40% at 50%  50%, rgba(255,224,186,0.35) 0%, transparent 60%);
        color: #1c1c1e;
        padding-bottom: 60px;
      }

      /* ── Liquid glass mixin ── */
      .glass {
        background: rgba(255,255,255,0.52);
        backdrop-filter: blur(28px) saturate(180%);
        -webkit-backdrop-filter: blur(28px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.72);
        box-shadow:
          0 1px 0   rgba(255,255,255,0.90) inset,   /* specular top edge  */
          0 0 0 0.5px rgba(255,255,255,0.40) inset,  /* inner glow         */
          0 4px 6px  rgba(0,0,0,0.04),
          0 12px 40px rgba(0,0,0,0.10);
      }

      /* ── Sticky header bar ── */
      header {
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        background: rgba(255,255,255,0.62);
        backdrop-filter: blur(32px) saturate(200%);
        -webkit-backdrop-filter: blur(32px) saturate(200%);
        border-bottom: 1px solid rgba(255,255,255,0.55);
        box-shadow: 0 1px 0 rgba(255,255,255,0.85) inset,
                    0 1px 20px rgba(0,0,0,0.08);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 7px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: #1c1c1e;
        flex-shrink: 0;
      }
      .logo-icon {
        width: 26px; height: 26px;
        background: linear-gradient(135deg, #6366f1, #a78bfa);
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px;
        box-shadow: 0 1px 0 rgba(255,255,255,0.4) inset, 0 2px 6px rgba(99,102,241,0.4);
      }

      .meta {
        flex: 1;
        font-size: 12px;
        color: rgba(60,60,67,0.55);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .actions { display: flex; gap: 7px; flex-shrink: 0; }

      /* Glass button */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 7px 15px;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: -0.01em;
        cursor: pointer;
        border: none;
        border-radius: 999px;
        transition: transform 0.12s ease, box-shadow 0.12s ease, opacity 0.15s;
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.72);
        box-shadow:
          0 1px 0 rgba(255,255,255,0.90) inset,
          0 2px 8px rgba(0,0,0,0.08);
        color: #1c1c1e;
      }
      .btn:not(:disabled):hover  { transform: translateY(-1px); box-shadow: 0 1px 0 rgba(255,255,255,0.90) inset, 0 4px 16px rgba(0,0,0,0.12); }
      .btn:not(:disabled):active { transform: translateY(0); }
      .btn:disabled { opacity: 0.38; cursor: not-allowed; }

      .btn-accent {
        background: linear-gradient(135deg, rgba(99,102,241,0.82), rgba(167,139,250,0.82));
        border-color: rgba(255,255,255,0.45);
        color: #fff;
        box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 3px 12px rgba(99,102,241,0.35);
      }
      .btn-accent:not(:disabled):hover { box-shadow: 0 1px 0 rgba(255,255,255,0.35) inset, 0 6px 20px rgba(99,102,241,0.45); }

      /* ── Progress ── */
      #progress-wrap {
        margin: 14px 16px 0;
        padding: 12px 16px;
        border-radius: 16px;
      }
      #progress-label {
        font-size: 12px;
        font-weight: 500;
        color: rgba(60,60,67,0.65);
        margin-bottom: 8px;
        letter-spacing: -0.01em;
      }
      #progress-track {
        height: 4px;
        background: rgba(0,0,0,0.08);
        border-radius: 99px;
        overflow: hidden;
        box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 99px;
        background: linear-gradient(90deg, #6366f1, #a78bfa, #c084fc);
        background-size: 200% 100%;
        transition: width 0.25s ease;
        animation: shimmer 2s linear infinite;
      }
      @keyframes shimmer {
        0%   { background-position: 200% center; }
        100% { background-position: -200% center; }
      }

      /* ── Preview ── */
      main { padding: 16px; }

      #preview-wrap {
        padding: 10px;
        border-radius: 22px;
      }
      #preview {
        display: block;
        width: 100%;
        height: auto;
        border-radius: 14px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.10), 0 16px 48px rgba(0,0,0,0.14);
      }
      #preview[src=""] { display: none; }

      /* ── Footer ── */
      footer {
        padding: 16px;
        font-size: 11px;
        color: rgba(60,60,67,0.40);
        text-align: center;
      }
      footer a { color: rgba(60,60,67,0.55); text-decoration: none; }
      footer a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-icon">🦊</div>
        GoFullFox
      </div>
      <span class="meta" id="meta">Preparing…</span>
      <div class="actions">
        <button class="btn btn-accent" id="downloadPng" disabled>↓ PNG</button>
        <button class="btn btn-accent" id="downloadPdf" disabled>↓ PDF</button>
        <button class="btn"           id="copy"        disabled>⎘ Copy</button>
      </div>
    </header>

    <div class="glass" id="progress-wrap">
      <div id="progress-label">Loading…</div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>

    <main>
      <div class="glass" id="preview-wrap">
        <img id="preview" src="" alt="Full page capture" />
      </div>
    </main>

    <footer>
      Unofficial Firefox port of
      <a href="https://github.com/mrcoles/full-page-screen-capture-chrome-extension"
         target="_blank" rel="noopener">GoFullPage</a>
      by Peter Coles — MIT
    </footer>

    <script src="result.js"></script>
  </body>
</html>
