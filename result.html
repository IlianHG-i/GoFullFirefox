<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GoFullFox</title>
    <style>
      :root { color-scheme: light dark; --accent: #a78bfa; --accent2: #6d28d9; }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #18181b;
        color: #e4e4e7;
        min-height: 100vh;
      }

      /* ── Header ── */
      header {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        background: rgba(24,24,27,0.92);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255,255,255,0.07);
        z-index: 10;
      }
      .logo {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--accent);
        flex-shrink: 0;
      }
      .meta {
        font-size: 12px;
        color: #71717a;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .actions { display: flex; gap: 8px; flex-shrink: 0; }
      button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 7px 14px;
        border: 0;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-primary   { background: var(--accent2); color: #fff; }
      .btn-secondary { background: rgba(255,255,255,0.08); color: #e4e4e7; }
      .btn-ghost     { background: transparent; color: #a1a1aa; border: 1px solid rgba(255,255,255,0.10); }

      /* ── Progress bar (stitching / encoding) ── */
      #progress-wrap {
        padding: 10px 16px 0;
      }
      #progress-label {
        font-size: 12px;
        color: #71717a;
        margin-bottom: 6px;
      }
      #progress-track {
        height: 3px;
        background: rgba(255,255,255,0.08);
        border-radius: 99px;
        overflow: hidden;
      }
      #progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, var(--accent2), var(--accent));
        border-radius: 99px;
        transition: width 0.2s ease;
      }

      /* ── Preview ── */
      main { padding: 16px; }
      #preview {
        display: block;
        max-width: 100%;
        height: auto;
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 6px;
        background: #fff;
      }

      footer {
        padding: 12px 16px;
        font-size: 11px;
        color: #52525b;
        border-top: 1px solid rgba(255,255,255,0.07);
      }
      footer a { color: #71717a; }
    </style>
  </head>
  <body>
    <header>
      <span class="logo">GoFullFox</span>
      <span class="meta" id="meta">Stitching…</span>
      <div class="actions">
        <button class="btn-primary"   id="downloadPng" disabled>Download PNG</button>
        <button class="btn-primary"   id="downloadPdf" disabled>Download PDF</button>
        <button class="btn-ghost"     id="copy"        disabled>Copy</button>
      </div>
    </header>

    <div id="progress-wrap">
      <div id="progress-label">Preparing…</div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>

    <main>
      <img id="preview" alt="" />
    </main>

    <footer>
      Unofficial Firefox port of
      <a href="https://github.com/mrcoles/full-page-screen-capture-chrome-extension"
         target="_blank" rel="noopener">GoFullPage</a>
      by Peter Coles. MIT.
    </footer>

    <script src="result.js"></script>
  </body>
</html>
